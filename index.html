<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>習得できたコード</title>
    <head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4B0082">
  
  <link rel="icon" type="image/png" href="icon192.png">
  <link rel="apple-touch-icon" href="icon192.png">

<style>
        body{
            background-color: black;
            color: yellow;

            display: flex;
            height: 100vh;

            margin: 0;
            padding: 0;

            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stars{
            position: fixed;
            height: 100%;
            width: 100%;
            top:0; left:0;
            z-index: -1;

            background-size: 200px 200px;
            background-image: radial-gradient(2px 2px at 50px 50px, orange, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 20px 20px, rgb(3, 238, 3), rgba(0,0,0,0)),
            radial-gradient(2px 2px at 10px 30px, pink, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 150px 120px, aqua, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 120px 150px, white, rgba(0,0,0,0));
            background-repeat: repeat;

            animation: moveDiagonal 10s ease-in-out infinite;

        }

        @keyframes moveDiagonal{
            from{background-position: 0 0;}
            to{background-position: 200px 200px;}
        }
    </style>
</head>

<body>
    <div class="stars"></div>

    <div id="buttonsdiv">
    <button onclick="natureSwap()"  id="idnature">🌌</button>
    <button onclick="animalSwap()"  id="idanimal">🐣</button>
    <button onclick="storySwap()" id="idstory">🧛</button>
    </div>

    <button onclick="btnSwap()">ボタンシャッフル</button>

    <div id="natureKekka"></div>
    <div id="animalKekka"></div>
    <div id="storyKekka"></div>

    <script>
        function natureSwap(){
            
            let natureOrder = ["🌟","🌌","🌲"];

            for (let last = natureOrder.length-1; last>0; last-- ){
             let randomPickup = Math.floor(Math.random()*(last+1));

             [natureOrder[last], natureOrder[randomPickup]] = [natureOrder[randomPickup], natureOrder[last]];
            };

            const kekka = document.getElementById('natureKekka');
            kekka.innerHTML=`${natureOrder[0]}→${natureOrder[1]}→${natureOrder[2]}`;
            
        }

        function animalSwap(){
            
            let animalOrder = ["🐄","🐭","🐣","🐸"];

            for (let last = animalOrder.length-1; last>0; last-- ){
             let randomPickup = Math.floor(Math.random()*(last+1));

             [animalOrder[last], animalOrder[randomPickup]] = [animalOrder[randomPickup], animalOrder[last]];
            };

            const kekka = document.getElementById('animalKekka');
            kekka.innerHTML=`${animalOrder[0]}→${animalOrder[1]}→${animalOrder[2]}`;
            
        }

        function storySwap(){
            
            let storyOrder = ["🧜‍♀️","🏃‍♂️‍➡️","💍","🛡️","⚔️","🗡️","📖","🐺","🦇","🧛","🧚","🌙",];

            for (let last = storyOrder.length-1; last>0; last-- ){
             let randomPickup = Math.floor(Math.random()*(last+1));

             [storyOrder[last], storyOrder[randomPickup]] = [storyOrder[randomPickup], storyOrder[last]];
            };

            const kekka = document.getElementById('storyKekka');
            kekka.innerHTML=storyOrder[0]+"→"+storyOrder[1]+"→"+storyOrder[2];
            
        }

        function btnSwap(){
            const btn1 = document.getElementById('idnature').textContent;
            const btn2 = document.getElementById('idanimal').textContent;
            const btn3 = document.getElementById('idstory').textContent;

            let btnShowingOrder = [btn1, btn2, btn3];

            for(let last = btnShowingOrder.length-1; last>0; last--){
                let randomPickup=Math.floor(Math.random()*(last+1));

                [btnShowingOrder[last],btnShowingOrder[randomPickup]] = [btnShowingOrder[randomPickup],btnShowingOrder[last]];
            };
            document.getElementById('idnature').textContent=btnShowingOrder[0];
            document.getElementById('idanimal').textContent=btnShowingOrder[1];
            document.getElementById('idstory').textContent=btnShowingOrder[2];
           
            const btnNature = document.getElementById('idnature');
            const btnAnimal = document.getElementById('idanimal');
            const btnStory = document.getElementById('idstory');

            const btnKansuOrder =[btnNature, btnAnimal, btnStory];

            for(let btnlast=btnKansuOrder.length-1; btnlast>0; btnlast--){
                let btnRandomPickup=Math.floor(Math.random()*(btnlast+1))

                [btnKansuOrder[btnlast],btnKansuOrder[btnRandomPickup]]=[btnKansuOrder[btnRandomPickup],btnKansuOrder[btnlast]];
            }
            
            const btnsDiv = document.getElementById('buttonsdiv');
            btnsDiv.innerHTML='';
            btnKansuOrder.forEach(karibox=>{btnsDiv.appendChild(karibox);
            });
        }
    </script>
</body>
</html>
