    /*body.css*/

button{

/*stars.css*/
 .stars{
            position: fixed;
            height: 100%;
            width: 100%;
            top:0; left:0;
            z-index: -1;

            background-size: 200px 200px;
            background-image: radial-gradient(2px 2px at 50px 50px, orange, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 20px 20px, rgb(3, 238, 3), rgba(0,0,0,0)),
            radial-gradient(2px 2px at 10px 30px, pink, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 150px 120px, aqua, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 120px 150px, white, rgba(0,0,0,0));

<body>
    <!--HTML-->
    <div class="moon">🌑</div>

    <div class="stars"></div>

    <div id="menu" class="opened">
      <button onclick="switchScreen('swapGameDiv')">シャッフルゲーム</button>
      <button onclick="switchScreen('flipGameCategoryDiv')">フリップゲーム</button>
    </div>

    <div id="swapGameDiv" class="hidden">
      <div class="swapNkekka">
            <button onclick="natureSwap()" id="idnature">🌹</button> <div id="natureKekka"></div>
      </div>
      <div class="swapNkekka">
            <button onclick="animalSwap()" id="idanimal">🦄</button><div id="animalKekka"></div>
      </div>
      <div class="swapNkekka">
            <button onclick="storySwap()" id="idstory">🏰</button><div id="storyKekka"></div>
      </div>  
      <div id="btnswapNmenu">
            <button onclick="btnSwap();surfaceSwap()" class="btn">ボタンシャッフル</button>
            <button onclick="goToMenu()">メニューに戻る</button>
      </div>
    </div>


      <div id="flipGameCategoryDiv" class="hidden">
        カテゴリー別カード↓
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('all')">全部</button>
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('metamorphosis')">変身</button>
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('others')">その他</button>
          <button onclick="goToMenu()">メニューに戻る</button>
      </div>

      <div id="flipcardNbuttonDiv" class="hidden">
        <div onclick="flipCard()" id="divFlipCard" tabindex="0" style="padding: 50px;"></div>
        <button onclick="toNext()">次へ</button>
          <button onclick="goToMenu()">メニューに戻る</button>
      </div>

      <script>
        //switchscreen.js
function switchScreen(roomIDhikisu) {
  const allTags = document.querySelectorAll('.opened');
  allTags.forEach(eachDiv => {
    eachDiv.classList.remove('opened');
    eachDiv.classList.add('hidden');
  });

  const ScreenIwannaGo = document.getElementById(roomIDhikisu);
  if (ScreenIwannaGo) {
    ScreenIwannaGo.classList.remove('hidden');
    ScreenIwannaGo.classList.add('opened');

    if (roomIDhikisu === 'flipcardNbuttonDiv') {
      console.log("ゲーム2開始！カードを初期化します");
      openTheCategory('all'); 
    }
    if (roomIDhikisu === 'flipcardNbuttonDiv' || roomIDhikisu === 'swapGameDiv') {
            document.body.style.overflow = 'hidden';
    }
    const moonEmoji = document.querySelector('.moon');
    if (moonEmoji) {
        if (roomIDhikisu === 'menu') {
            moonEmoji.style.display = 'block'; 
        } else {
            moonEmoji.style.display = 'none'; 
        }
    }
  }
}
function resetScroll() {　
    document.body.style.overflow = '';
}
function goToMenu() {
  const moonEmoji = document.querySelector('.moon');
    if (moonEmoji) moonEmoji.style.display = 'block';
  resetScroll();
  switchScreen('menu');
}
function goToEachFlipCategory(){
    switchScreen('flipcardNbuttonDiv');
}






   //swap.js
           function surfaceSwap(){
            const btn1 = document.getElementById('idnature').textContent;
            const btn2 = document.getElementById('idanimal').textContent;
            const btn3 = document.getElementById('idstory').textContent;

            let surfaceOrder = [btn1, btn2, btn3];

                for(let last = surfaceOrder.length-1; last>0; last--){
                    let randomPickup=Math.floor(Math.random()*(last+1));
                    [surfaceOrder[last],surfaceOrder[randomPickup]] = [surfaceOrder[randomPickup],surfaceOrder[last]];
                };
                document.getElementById('idnature').textContent=surfaceOrder[0];
                document.getElementById('idanimal').textContent=surfaceOrder[1];
                document.getElementById('idstory').textContent=surfaceOrder[2];
        }


        const kekkaIdArray = ['natureKekka', 'animalKekka', 'storyKekka'];
        const funcArray = ['natureSwap', 'animalSwap', 'storySwap'];
        const buttonIdArray = ['idnature', 'idanimal', 'idstory'];

        let numArray = [0, 1, 2];

        function numArrayShuffle() {
            for (let i = numArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numArray[i], numArray[j]] = [numArray[j], numArray[i]];
            }

            getRandomFuncandKekka();
            surfaceSwap();

            const btn = document.querySelector('.btn');
            btn.textContent = "シャッフル完了！";
            setTimeout(() => { btn.textContent = "ボタンシャッフル"; }, 1000);
        }

        function getRandomFuncandKekka() {
            buttonIdArray.forEach((idNantoka, sonoIndex) => {
                const anyBtn = document.getElementById(idNantoka);
                if (!anyBtn) return;
                const shuffledNumArraydenoSonoIndexniattaSuuji = numArray[sonoIndex];
                const randomFunc = funcArray[shuffledNumArraydenoSonoIndexniattaSuuji];

                anyBtn.onclick = function() {
                    const randomKekkaId = kekkaIdArray[shuffledNumArraydenoSonoIndexniattaSuuji];
                    shffleEmojiNshowKekka(randomKekkaId, randomFunc);
                };
            });
        }

        function shffleEmojiNshowKekka(randomKekkaId, randomFunc) {
            let emojiArray = [];

            if (randomFunc === 'natureSwap') {
                emojiArray = ["🌟","🌌","🌲","🌹","🪨","🌅","🏞️","☀️","🌙","🌕","❄️","🔥","⚡","💧","🌪️","🍎","🍓","🍌","🍍","🍄‍🟫","🧅","🥚","🥜","🍞","🍔","🍕","🍜","🍣","🍨","🍺","🍷","🎄","🎃","🎆"];
            } else if (randomFunc === 'animalSwap') {
                emojiArray = ["🦁","🦄","🐏","🐐","🦇","🐺","🐢","🐍","🕊️","🐣","🐦","🐦‍🔥","🪿","🦢","🐚","🐟","🐸","🦉","🐱","🐙","🐶"];
            } else if (randomFunc === 'storySwap') {
                emojiArray = ["🧛🏻","🦇","🐺","🌕","🌬️","🐟","🪺","🧚🏻","👻","☠️","🧟","🦤","🍎","🍖","🍄","🥪","🍷","🧭","⚓","🏰","🗺️","🏹","🪄","💎","🕯️","🧱","🚪","💍","⏱️","🪦","⚰️","📿","⚱️","💣","🗡️","🛡️","🗝️","🪉"];
            }

            for (let last = emojiArray.length - 1; last > 0; last--) {
                let randomPickup = Math.floor(Math.random() * (last + 1));
                [emojiArray[last], emojiArray[randomPickup]] = [emojiArray[randomPickup], emojiArray[last]];
            }

            const kekka = document.getElementById(randomKekkaId);
            if (kekka) {
                kekka.innerHTML = `${emojiArray[0]}→${emojiArray[1]}→${emojiArray[2]}`;
            }
        }


        function autoMakeBTNSHUFFLEhaveNumArrayShuffle() {      
            getRandomFuncandKekka();
            const btnshuffleBtn = document.querySelector('.btn');
            if (btnshuffleBtn) {
                btnshuffleBtn.onclick = numArrayShuffle;
            }
        }

        autoMakeBTNSHUFFLEhaveNumArrayShuffle();

        window.natureSwap = () => shffleEmojiNshowKekka('natureKekka', 'natureSwap');
        window.animalSwap = () => shffleEmojiNshowKekka('animalKekka', 'animalSwap');
        window.storySwap = () => shffleEmojiNshowKekka('storyKekka', 'storySwap');
        window.btnSwap = numArrayShuffle; 









        //flip.js
            const TotalqNa=[{q:"🌕",a:"🐺",category:"metamorphosis"},{q:"🧛🏻",a:"🦇",category:"metamorphosis"},{q:"🐣",a:"🐦‍🔥",category:"metamorphosis"},{q:"🗡️",a:"🛡️",category:"others"}];
    const cardUlooking = document.getElementById('divFlipCard');
    let indexUlooking = 0;
    let surface = true;

    let chosenCategory = 'all';
    let categorizedArray = [];

        function openTheCategory(chosenCa){
            chosenCategory = chosenCa;         
            categorizedArray = pickupNmakeArray();
            renderAcard();
            indexUlooking = 0;            
        }

        function pickupNmakeArray(){
            if(chosenCategory === 'all'){
                return TotalqNa;
            }else{
                return TotalqNa.filter(EachInqNa => EachInqNa.category === chosenCategory);
            }
        }

        function renderAcard(){
            if(categorizedArray.length === 0){
                cardUlooking.textContent = "カード準備中🙇‍♀️";
                return;
            }
            cardUlooking.textContent = surface ? categorizedArray[indexUlooking].q  : categorizedArray[indexUlooking].a;
            console.log("textContent 設定:", cardUlooking.textContent);
        }

        function flipCard(){
            surface=!surface;
            renderAcard();
        }

        function toNext(){
            indexUlooking++;
            if(indexUlooking >= categorizedArray.length){
                shuffleFY();
                indexUlooking = 0;
            }
            surface = true;
            renderAcard();
        }
        function shuffleFY(){
                    for(let indexLast = TotalqNa.length-1; indexLast > 0; indexLast--){
                        let index0toLast = Math.floor(Math.random()*(indexLast+1));
                        [TotalqNa[indexLast], TotalqNa[index0toLast]] = [TotalqNa[index0toLast], TotalqNa[indexLast]];
                    }
                    categorizedArray = pickupNmakeArray();
                }   

    categorizedArray = pickupNmakeArray();
    renderAcard();
      </script>
