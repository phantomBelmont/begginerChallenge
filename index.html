<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>習得できたコード</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4B0082">
  <link rel="icon" type="image/png" href="icon192.png">
  <link rel="apple-touch-icon" href="icon192.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('SW registered: ', registration);
          })
          .catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>

<link rel="stylesheet" href="body.css">
<link rel="stylesheet" href="stars.css">
<link rel="stylesheet" href="device.css">

</head>

<body>
    <div class="moon">🌑</div>
    
    <div class="stars"></div>

    <div id="menu" class="opened">
      <button onclick="goToSwap()">シャッフルゲーム</button>
      <button onclick="goToFlipCategory()">フリップゲーム</button>
    </div>

      <div id="swapGameDiv" class="hidden">  
        <button onclick="natureSwap()" id="idnature">🌹</button>
        <button onclick="animalSwap()"  id="idanimal">🦄</button>
        <button onclick="storySwap()" id="idstory">🏰</button>

        <div id="natureKekka"></div>
        <div id="animalKekka"></div>
        <div id="storyKekka"></div>

        <button onclick="btnSwap()" class="btn">ボタンシャッフル</button>
        <button onclick="goToMenu()">メニューに戻る</button>
      </div>

      <div id="flipGameCategoryDiv" class="hidden">
        カテゴリー別カード↓
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('all')">全部</button>
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('metamorphosis')">変身</button>
        <button onclick="switchScreen('flipcardNbuttonDiv');openTheCategory('others')">その他</button>
          <button onclick="goToMenu()">メニューに戻る</button>
      </div>

      <div id="flipcardNbuttonDiv" class="hidden">
        <div onclick="flipCard()" id="divFlipCard" tabindex="0" style="padding: 50px;"></div>
        <button onclick="toNext()">次へ</button>
          <button onclick="goToMenu()">メニューに戻る</button>
      </div>

  <script src="switchscreen.js" defer></script>
  <script src="swap.js" defer></script>
  <script src="flip.js" defer></script>

</body>
</html>
